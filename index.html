<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        /* Importando uma fonte moderna do Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            /* Um degradê suave e moderno no fundo */
            background: linear-gradient(135deg, #e0eafc, #cfdef3); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* O "Card" do formulário */
        .login-container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Alinhamento do topo (Logo + Título) */
        .header-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 24px;
            color: #1a1a1a;
            font-weight: 600;
        }

        h2 {
            font-size: 14px;
            color: #666666;
            font-weight: 400;
            margin-bottom: 30px;
        }

        /* Estilização dos campos de texto */
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background-color: #f9f9f9;
            transition: all 0.3s ease;
            outline: none;
        }

        /* Efeito de quando o usuário clica no campo */
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Botão principal (Continuar) */
        input[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-bottom: 20px;
        }

        input[type="submit"]:hover {
            background-color: #1d4ed8;
        }

        /* Divisor "ou" */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #999999;
            font-size: 12px;
            margin-bottom: 20px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        /* Botões de Login Social (Google, MS, Apple) */
        .btn-social {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #333333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .btn-social:hover {
            background-color: #f5f5f5;
            border-color: #cccccc;
        }

        .btn-social img {
            height: 20px;
            width: 20px;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <!-- Criamos essa div para envelopar e organizar todo o conteúdo do login -->
    <div class="login-container">
        
        <div class="header-login">
            <img src="img/fumec.jpg" height="40" alt="Logo">
            <h1>Boas-vindas!</h1>
        </div>
        <h2>Faça login para aproveitar todas as funcionalidades</h2>
        
        <form>
            <!-- Removi as tags <br> e usei margens no CSS, que é o padrão correto -->
            <input type="email" name="email" id="email" placeholder="Digite seu e-mail" required>
            <input type="password" name="password" id="password" placeholder="Digite sua senha" required>

            <input type="submit" name="continuar" id="continuar" value="Continuar">

            <!-- Linha estilosa para separar o login normal do social -->
            <div class="divider">ou</div>

            <!-- Adicionei a classe "btn-social" para pegar a estilização e mudei os types para button -->
            <button type="button" class="btn-social">
                <img src="d:\Meus Documentos\Documentos\testeDoCoda\img\google.svg" alt="Google">
                Continuar com o Google
            </button>

            <button type="button" class="btn-social">
                <img src="d:\Meus Documentos\Documentos\testeDoCoda\img\microsoft.svg" alt="Microsoft">
                Continuar com a Microsoft
            </button>

            <button type="button" class="btn-social">
                <img src="d:\Meus Documentos\Documentos\testeDoCoda\img\apple.svg" alt="Apple">
                Continuar com a Apple
            </button>
        </form>

    </div>

</body>
</html>
